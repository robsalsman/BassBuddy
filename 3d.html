<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a3a4a" />
<title>BassBuddy — 3D Preview</title>
<style>
  html,body{margin:0;height:100%;background:#06222c;overflow:hidden;font-family:-apple-system,system-ui,sans-serif;color:#eaf6fb;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;}
  .ui{position:fixed;left:0;right:0;pointer-events:none;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.6);z-index:5;}
  #top{top:calc(12px + env(safe-area-inset-top,0px));font-weight:800;font-size:15px;letter-spacing:.3px;}
  #top small{display:block;font-weight:600;font-size:12px;color:#bfe0ec;margin-top:3px;}
  #bottom{bottom:calc(18px + env(safe-area-inset-bottom,0px));font-size:12px;color:#bfe0ec;}
  a.back{position:fixed;top:calc(10px + env(safe-area-inset-top,0px));left:12px;z-index:6;
    background:rgba(8,32,42,.8);border:1px solid rgba(255,255,255,.15);color:#eaf6fb;
    text-decoration:none;font-weight:800;font-size:14px;padding:9px 13px;border-radius:999px;backdrop-filter:blur(6px);}
  .species{position:fixed;bottom:calc(54px + env(safe-area-inset-bottom,0px));left:0;right:0;display:flex;gap:8px;justify-content:center;z-index:6;}
  .species button{background:rgba(8,32,42,.8);border:1px solid rgba(255,255,255,.15);color:#eaf6fb;font-weight:800;
    font-size:12px;padding:8px 12px;border-radius:999px;cursor:pointer;}
  .species button.on{background:#5be37a;color:#06321a;border-color:transparent;}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;font-size:14px;color:#ffd2d2;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a class="back" href="index.html">← Game</a>
<div id="top" class="ui">3D Preview 🐟<small>real-time WebGL — drag to look around</small></div>
<div class="species">
  <button data-s="largemouth" class="on">Largemouth</button>
  <button data-s="smallmouth">Smallmouth</button>
  <button data-s="spotted">Spotted</button>
</div>
<div id="bottom" class="ui">Original 3D bass · runs on your device's GPU</div>
<div id="err"></div>

<script type="module">
import * as THREE from "./vendor/three.module.min.js";

const SPECIES = {
  largemouth: { back: 0x33401f, mid: 0x6f9e4e, belly: 0xeef1d6, pattern: "blotch", pat: 0x2a3618, eye: 0x16242b, len: 2.4 },
  smallmouth: { back: 0x5e4524, mid: 0xa07b46, belly: 0xefe6cf, pattern: "bars",  pat: 0x6e4f28, eye: 0xc23a2a, len: 2.2 },
  spotted:    { back: 0x2f3d1c, mid: 0x6f8a3e, belly: 0xeef0d2, pattern: "spots", pat: 0x2a3618, eye: 0xc23a2a, len: 2.1 },
};

const canvas = document.getElementById("c");
let renderer, scene, camera, fish, clock, basePos, geomRef, dragX = 0.5, dragY = 0.35, targetX = 0.5, targetY = 0.35;

try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = false;
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x114b63);
  scene.fog = new THREE.FogExp2(0x0d3f55, 0.085);

  camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 0.6, 6);

  // lighting — sun from above the surface + soft fill
  const hemi = new THREE.HemisphereLight(0xbfe9ff, 0x0a2a38, 1.1);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff2cf, 1.5);
  sun.position.set(2.5, 8, 4);
  scene.add(sun);

  // water surface seen from below
  const surfGeo = new THREE.PlaneGeometry(80, 80, 1, 1);
  const surfMat = new THREE.MeshBasicMaterial({ color: 0x2a93b8, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const surf = new THREE.Mesh(surfGeo, surfMat);
  surf.rotation.x = -Math.PI / 2; surf.position.y = 5;
  scene.add(surf);

  // god-ray cones from the surface
  const rayMat = new THREE.MeshBasicMaterial({ color: 0xdff6ff, transparent: true, opacity: 0.05, side: THREE.DoubleSide, depthWrite: false });
  for (let i = 0; i < 5; i++) {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(2.2, 12, 8, 1, true), rayMat);
    cone.position.set((i - 2) * 3 + (Math.random() - 0.5) * 2, 3, -3 - Math.random() * 3);
    cone.rotation.x = Math.PI; cone.rotation.z = (Math.random() - 0.5) * 0.3;
    scene.add(cone);
  }

  // murky bottom
  const bottom = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: 0x0a3247, roughness: 1 }));
  bottom.rotation.x = -Math.PI / 2; bottom.position.y = -4;
  scene.add(bottom);

  // drifting particulate
  const pc = 240, pg = new THREE.BufferGeometry(), pa = new Float32Array(pc * 3);
  for (let i = 0; i < pc; i++) { pa[i*3] = (Math.random()-0.5)*30; pa[i*3+1] = (Math.random()-0.5)*16; pa[i*3+2] = (Math.random()-0.5)*30; }
  pg.setAttribute("position", new THREE.BufferAttribute(pa, 3));
  const motes = new THREE.Points(pg, new THREE.PointsMaterial({ color: 0xcfeefb, size: 0.045, transparent: true, opacity: 0.5 }));
  scene.add(motes);

  buildFish("largemouth");
  clock = new THREE.Clock();
  addEventListener("resize", onResize);
  // drag to orbit
  let dragging = false, px = 0, py = 0;
  canvas.addEventListener("pointerdown", e => { dragging = true; px = e.clientX; py = e.clientY; });
  addEventListener("pointermove", e => { if (!dragging) return; targetX += (e.clientX - px) / innerWidth * 1.5; targetY = Math.max(0.05, Math.min(0.8, targetY - (e.clientY - py) / innerHeight * 1.2)); px = e.clientX; py = e.clientY; });
  addEventListener("pointerup", () => dragging = false);
  document.querySelectorAll(".species button").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll(".species button").forEach(b => b.classList.remove("on"));
    btn.classList.add("on"); buildFish(btn.dataset.s);
  }));
  animate();
} catch (e) {
  const el = document.getElementById("err");
  el.style.display = "flex";
  el.textContent = "3D needs WebGL, which isn't available here: " + e.message;
}

// ---- build an original procedural bass mesh ----
function buildFish(sp) {
  if (fish) { scene.remove(fish); fish.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); }
  const S = SPECIES[sp], LEN = S.len, SEG = 72, RING = 22;
  fish = new THREE.Group();

  // half-body DEPTH profile (t: 0 tail tip .. 1 snout). Bass are deep-bodied
  // mid, with a blunt deep head, tapering to a narrow caudal peduncle.
  const depth = t => {
    const body = Math.sin(Math.pow(Math.min(t, 1), 1.2) * Math.PI); // peak shifted toward head
    let d = 0.05 + body * 0.50;
    if (t > 0.84) d = Math.max(d, 0.34) * (1 - (t - 0.84) / 0.16 * 0.62); // blunt snout
    if (t < 0.10) d *= t / 0.10;                                          // pinch tail base
    return d;
  };
  // lateral WIDTH factor — bass are strongly laterally compressed (thin),
  // fullest through the head/shoulder and pinched at the tail.
  const widthFac = t => 0.34 + Math.sin(Math.min(t, 1) * Math.PI) * 0.12;

  const positions = [], colors = [], indices = [];
  const cBack = new THREE.Color(S.back), cMid = new THREE.Color(S.mid), cBelly = new THREE.Color(S.belly), cPat = new THREE.Color(S.pat);
  const cMouth = new THREE.Color(0x20140e);
  for (let i = 0; i <= SEG; i++) {
    const t = i / SEG, x = (t - 0.5) * LEN, d = depth(t), w = widthFac(t);
    for (let j = 0; j <= RING; j++) {
      const a = j / RING * Math.PI * 2;
      const y = Math.cos(a) * d, z = Math.sin(a) * d * w;
      positions.push(x, y, z);
      const ty = (Math.cos(a) * 0.5 + 0.5); // 0 belly, 1 back
      let col = ty < 0.5 ? cBelly.clone().lerp(cMid, ty * 2) : cMid.clone().lerp(cBack, (ty - 0.5) * 2);
      // dark mouth line across the lower head (the iconic large gape)
      if (t > 0.80 && t < 0.97 && ty > 0.30 && ty < 0.52) col.lerp(cMouth, 0.65);
      // species markings on the flanks
      const flank = Math.abs(z) > d * w * 0.4;
      if (flank && t < 0.82) {
        if (S.pattern === "blotch") { if (Math.abs(Math.cos(a)) < 0.30 && Math.sin(t * 24) > 0.35) col.lerp(cPat, 0.55); } // lateral blotch band
        else if (S.pattern === "bars") { if (ty > 0.42 && Math.sin(t * 34) > 0.55) col.lerp(cPat, 0.5); }                  // vertical bars
        else if (S.pattern === "spots") { if (ty < 0.5 && Math.sin(t * 40) * Math.cos(a * 5) > 0.5) col.lerp(cPat, 0.55); } // rows of spots
      }
      colors.push(col.r, col.g, col.b);
    }
  }
  for (let i = 0; i < SEG; i++) for (let j = 0; j < RING; j++) {
    const a = i * (RING + 1) + j, b = a + RING + 1;
    indices.push(a, b, a + 1, b, b + 1, a + 1);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const body = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.5, metalness: 0.14 }));
  fish.add(body);
  geomRef = geo; basePos = Float32Array.from(positions);

  const finMat = new THREE.MeshStandardMaterial({ color: S.back, roughness: 0.75, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
  // tail fin (slightly forked, vertical)
  const tailShape = new THREE.Shape();
  tailShape.moveTo(0, 0); tailShape.lineTo(-0.75, 0.62); tailShape.lineTo(-0.55, 0); tailShape.lineTo(-0.75, -0.62); tailShape.closePath();
  const tail = new THREE.Mesh(new THREE.ShapeGeometry(tailShape), finMat);
  tail.position.x = -LEN / 2 + 0.02; fish.add(tail); fish.tail = tail;
  // spiny + soft dorsal ridge along the back
  const dorsal = new THREE.Shape();
  dorsal.moveTo(-0.7, 0); dorsal.lineTo(-0.5, 0.34); dorsal.lineTo(-0.05, 0.46); dorsal.lineTo(0.4, 0.30); dorsal.lineTo(0.7, 0); dorsal.closePath();
  const df = new THREE.Mesh(new THREE.ShapeGeometry(dorsal), finMat);
  df.rotation.y = Math.PI / 2; df.position.set(-LEN * 0.02, depth(0.5) * 0.98, 0); fish.add(df);
  // anal fin (underside, rear)
  const af = new THREE.Mesh(new THREE.ShapeGeometry(dorsal), finMat);
  af.scale.set(0.4, -0.5, 0.4); af.rotation.y = Math.PI / 2; af.position.set(-LEN * 0.22, -depth(0.34) * 0.95, 0); fish.add(af);
  // pectoral fins
  for (const s of [1, -1]) {
    const pf = new THREE.Mesh(new THREE.ShapeGeometry(dorsal), finMat);
    pf.scale.set(0.42, 0.42, 0.42); pf.rotation.x = s * 0.8; pf.rotation.z = -0.3;
    pf.position.set(LEN * 0.22, -depth(0.7) * 0.2, s * depth(0.7) * widthFac(0.7) * 0.9); fish.add(pf);
  }
  // eyes — high on the deep head
  const eyeW = new THREE.MeshStandardMaterial({ color: 0xf6f3e8, roughness: 0.3 });
  const eyeB = new THREE.MeshStandardMaterial({ color: S.eye, roughness: 0.15 });
  const ex = LEN * 0.36, ed = depth(0.86);
  for (const s of [1, -1]) {
    const ew = new THREE.Mesh(new THREE.SphereGeometry(0.075, 14, 14), eyeW);
    ew.position.set(ex, ed * 0.45, s * ed * widthFac(0.86) * 0.92); fish.add(ew);
    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 12), eyeB);
    eb.position.set(ex + 0.03, ed * 0.45, s * ed * widthFac(0.86) * 1.02); fish.add(eb);
  }
  scene.add(fish);
}

function onResize() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); }

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // swim: undulate the body with a travelling wave (strongest toward the tail)
  if (geomRef && basePos) {
    const p = geomRef.attributes.position.array;
    for (let i = 0; i < p.length; i += 3) {
      const x = basePos[i];
      const tailness = Math.min(1, Math.max(0, (-(x) + 1.0) / 2.0));
      const wave = Math.sin(x * 2.6 - t * 6) * 0.16 * (0.15 + tailness * tailness);
      p[i + 2] = basePos[i + 2] + wave;
    }
    geomRef.attributes.position.needsUpdate = true;
    geomRef.computeVertexNormals();
  }
  if (fish) {
    fish.rotation.y = Math.sin(t * 0.5) * 0.5;       // slow turn
    fish.position.y = Math.sin(t * 0.9) * 0.25;       // gentle rise/fall
    if (fish.tail) fish.tail.rotation.y = Math.sin(t * 6) * 0.4;
  }
  // ease camera toward drag target, orbit around the fish
  dragX += (targetX - dragX) * 0.06; dragY += (targetY - dragY) * 0.06;
  const ang = dragX * Math.PI * 2, rad = 6;
  camera.position.set(Math.sin(ang) * rad, 0.4 + dragY * 4, Math.cos(ang) * rad);
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
</script>
</body>
</html>
